# MLX LoRA config for V8 student model (semantic tokens, no _raw output)
# Optimized for M1 16GB
#
# Student: Qwen2.5-0.5B-Instruct-4bit
# Task: Semantic token classification (5 fields, 5 JSON keys — no _raw)
#   loc (5) + arr (4) + sen (3) + tech (5 individual, arrays) + comp (7)
# V8 change: student outputs only token fields (92 char avg vs 380 in v7)
# Training: fresh LoRA from base (NEVER resume from existing adapter)

model: "mlx-community/Qwen2.5-0.5B-Instruct-4bit"
data: "data/v8/mlx"
train: true
fine_tune_type: "lora"

# LoRA hyperparameters (same as v7)
lora_parameters:
  rank: 16
  alpha: 32
  dropout: 0.05
  scale: 1.0
  weight_decay: 0.0

# Training parameters (same as v7)
batch_size: 1
grad_accumulation_steps: 16 # Effective batch = 16
iters: 2000
learning_rate: 2e-5
warmup_steps: 100

max_seq_length: 8192

# Validation
val_batches: 40
steps_per_eval: 25

# Output
adapter_path: "finetune/adapters_v8"
save_every: 50

# Memory optimization
mask_prompt: true # Only train on assistant response (5-field token JSON)
grad_checkpoint: true # Gradient checkpointing for M1 16GB
