# MLX LoRA config for V6 student model (8-field structured reasoning)
# Optimized for M1 16GB
#
# Student: Qwen2.5-0.5B-Instruct-4bit
# Task: Semantic token classification with per-field reasoning
# Training: ~632 examples, FRESH LoRA from base (NEVER resume from adapter)
#
# Key changes from V5.1:
#   - Output format: 8-field interleaved (loc_reason, loc, role_reason, ...)
#   - batch_size: 1 (OOM prevention — V5.1 crashed at iter 890)
#   - grad_accumulation: 16 (effective batch = 16)
#   - Fresh LoRA — no adapter resume
#   - V6 teacher prompt labels
#
# TRAINING COMMAND:
#   python3 -m mlx_lm.lora --config finetune/lora_config_v6.yaml
#
# EVAL COMMAND (per checkpoint):
#   python3 finetune/eval_student.py \
#     --adapter finetune/adapters_v6/XXXXXXXXX_adapters.safetensors \
#     --test-file data/v6/eval_150.jsonl \
#     --prompt prompts/student_v6.txt

model: "mlx-community/Qwen2.5-0.5B-Instruct-4bit"
data: "data/v6/mlx"
train: true
fine_tune_type: "lora"

# LoRA hyperparameters
lora_parameters:
  rank: 16
  alpha: 32
  dropout: 0.1
  scale: 1.0
  weight_decay: 0.01

# Training parameters
batch_size: 1
grad_accumulation_steps: 16  # Effective batch = 16
iters: 1000
learning_rate: 5e-5
warmup_steps: 50

max_seq_length: 8192

# Validation
val_batches: 40
steps_per_eval: 25

# Output — fresh adapter directory
adapter_path: "finetune/adapters_v6"
save_every: 25

# Memory optimization
mask_prompt: true
grad_checkpoint: true
