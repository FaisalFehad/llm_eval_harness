# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
#
# V6 Teacher Prompt Sanity Tests
# ──────────────────────────────────────────────────────────────
# Quick edge-case tests for prompts/teacher_v6.txt before labeling.
# Run: npx promptfoo eval -c configs/promptfoo_teacher_v6.yaml
# Takes ~5 seconds with GPT-4o-mini. Catches prompt regressions.
# ──────────────────────────────────────────────────────────────

description: "V6 teacher prompt — 28 edge-case sanity tests"

prompts:
  - file://prompts/teacher_v6.txt

providers:
  - id: openai:gpt-4o-mini
    config:
      temperature: 0
      max_tokens: 500

defaultTest:
  assert:
    # Every test must return valid JSON
    - type: is-json
    # Every test must have valid tokens
    - type: javascript
      value: |
        const r = JSON.parse(output);
        const valid = {
          loc: ['LONDON_OR_REMOTE','UK_OTHER','OUTSIDE_UK','MISSING'],
          role: ['SENIOR_PLUS','MID_LEVEL','NO_SENIORITY'],
          tech: ['NONE','JS_TS','NODE','NODE_JS_TS','AI_ML','JS_TS_AI_ML','NODE_AI_ML','NODE_JS_TS_AI_ML'],
          comp: ['NO_GBP','UP_TO_ONLY','BELOW_45K','RANGE_55_74K','RANGE_75_99K','ABOVE_100K'],
        };
        const bad = Object.entries(valid).filter(([k, vs]) => !vs.includes(r[k]));
        bad.length === 0 || (() => { throw new Error('Invalid tokens: ' + bad.map(([k]) => k + '=' + r[k]).join(', ')); })();

tests:
  # ═══════════════════════════════════════════════════════════════════
  # ROLE — Engineering gate + seniority (Findings 6, 7, 10, 11, 12)
  # ═══════════════════════════════════════════════════════════════════

  # 1. Engineering Manager → SENIOR_PLUS (Finding 6)
  - description: "ROLE-01: Engineering Manager → SENIOR_PLUS"
    vars:
      job_title: "Engineering Manager"
      job_location: "London, United Kingdom"
      jd_text: "We are looking for an Engineering Manager to lead our backend team. You will manage 8 engineers working on our Node.js microservices platform. Requirements: 5+ years engineering experience, 2+ years people management."
    assert:
      - type: javascript
        value: "JSON.parse(output).role === 'SENIOR_PLUS'"

  # 2. Director of Engineering → SENIOR_PLUS (Finding 7)
  - description: "ROLE-02: Director of Engineering → SENIOR_PLUS"
    vars:
      job_title: "Director of Engineering"
      job_location: "Manchester, United Kingdom"
      jd_text: "Director of Engineering to lead our platform team. 10+ years experience required. You will set technical direction and manage engineering managers."
    assert:
      - type: javascript
        value: "JSON.parse(output).role === 'SENIOR_PLUS'"

  # 3. CTO → SENIOR_PLUS (Finding 7)
  - description: "ROLE-03: CTO → SENIOR_PLUS"
    vars:
      job_title: "CTO (Chief Technology Officer)"
      job_location: "London, United Kingdom"
      jd_text: "CTO role at a Series B startup. You will own the technical roadmap and build the engineering team from 5 to 30."
    assert:
      - type: javascript
        value: "JSON.parse(output).role === 'SENIOR_PLUS'"

  # 4. Sr. Software Engineer → SENIOR_PLUS (Finding 7)
  - description: "ROLE-04: Sr. Software Engineer → SENIOR_PLUS"
    vars:
      job_title: "Sr. Software Engineer"
      job_location: "Bristol, United Kingdom"
      jd_text: "Sr. Software Engineer needed for our payments team. Python, PostgreSQL, microservices. 6+ years experience."
    assert:
      - type: javascript
        value: "JSON.parse(output).role === 'SENIOR_PLUS'"

  # 5. Engineering Team Leader → SENIOR_PLUS (Finding 12)
  - description: "ROLE-05: Engineering Team Leader → SENIOR_PLUS"
    vars:
      job_title: "Engineering Team Leader"
      job_location: "Edinburgh, United Kingdom"
      jd_text: "Engineering Team Leader to manage our data platform squad. Java, Kafka, AWS. 7+ years experience with 2+ years leading teams."
    assert:
      - type: javascript
        value: "JSON.parse(output).role === 'SENIOR_PLUS'"

  # 6. Chief Architect → SENIOR_PLUS (Finding 18)
  - description: "ROLE-06: Chief Architect → SENIOR_PLUS"
    vars:
      job_title: "Chief Architect"
      job_location: "London, United Kingdom"
      jd_text: "Chief Architect to define system architecture across our platform. Cloud, microservices, event-driven design. 12+ years experience."
    assert:
      - type: javascript
        value: "JSON.parse(output).role === 'SENIOR_PLUS'"

  # 7. Founding Engineer → SENIOR_PLUS
  - description: "ROLE-07: Founding Engineer → SENIOR_PLUS"
    vars:
      job_title: "Founding Engineer"
      job_location: "Remote"
      jd_text: "Founding Engineer at a pre-seed startup. You will be engineer #1, building our MVP from scratch. Full autonomy over tech stack."
    assert:
      - type: javascript
        value: "JSON.parse(output).role === 'SENIOR_PLUS'"

  # 8. Engineer III → SENIOR_PLUS
  - description: "ROLE-08: Software Engineer III → SENIOR_PLUS"
    vars:
      job_title: "Software Engineer III"
      job_location: "London, United Kingdom"
      jd_text: "Software Engineer III on our search team. Design and implement distributed systems. Go, gRPC, Kubernetes."
    assert:
      - type: javascript
        value: "JSON.parse(output).role === 'SENIOR_PLUS'"

  # 9. Associate Solutions Architect → NOT SENIOR_PLUS (Finding 11)
  - description: "ROLE-09: Associate Solutions Architect → not SENIOR_PLUS"
    vars:
      job_title: "Associate Solutions Architect"
      job_location: "London, United Kingdom"
      jd_text: "Associate Solutions Architect to work with enterprise clients. AWS, Azure, cloud migrations. 2-4 years experience."
    assert:
      - type: javascript
        value: "JSON.parse(output).role !== 'SENIOR_PLUS'"

  # 10. Regional Director → NO_SENIORITY (Finding 20 — not engineering)
  - description: "ROLE-10: Regional Director → NO_SENIORITY (not engineering)"
    vars:
      job_title: "Regional Director"
      job_location: "Birmingham, United Kingdom"
      jd_text: "Regional Director to oversee EMEA sales operations. Manage a team of 15 account executives. 10+ years B2B sales leadership."
    assert:
      - type: javascript
        value: "JSON.parse(output).role === 'NO_SENIORITY'"

  # 11. Director Fire Engineering → NO_SENIORITY (Finding 20)
  - description: "ROLE-11: Director Fire Engineering → NO_SENIORITY (not software)"
    vars:
      job_title: "Director Fire Engineering"
      job_location: "Leeds, United Kingdom"
      jd_text: "Director of Fire Engineering for our construction consultancy. BSc in Fire Safety Engineering required. Chartered Engineer status preferred."
    assert:
      - type: javascript
        value: "JSON.parse(output).role === 'NO_SENIORITY'"

  # 12. Senior Marketing Manager → NO_SENIORITY (Finding 10)
  - description: "ROLE-12: Senior Marketing Manager → NO_SENIORITY (not engineering)"
    vars:
      job_title: "Senior Marketing Manager"
      job_location: "London, United Kingdom"
      jd_text: "Senior Marketing Manager to lead our B2B demand generation. HubSpot, Google Ads, content strategy. 5+ years marketing experience."
    assert:
      - type: javascript
        value: "JSON.parse(output).role === 'NO_SENIORITY'"

  # 13. Senior Sales Engineer → NO_SENIORITY (Finding 10 — engineering gate must reject)
  - description: "ROLE-13: Senior Sales Engineer → NO_SENIORITY (not software engineering)"
    vars:
      job_title: "Senior Sales Engineer"
      job_location: "London, United Kingdom"
      jd_text: "Senior Sales Engineer to support our enterprise sales team with technical demos and POCs. Present our SaaS platform to CTOs and VPs. 5+ years B2B sales experience."
    assert:
      - type: javascript
        value: "JSON.parse(output).role === 'NO_SENIORITY'"

  # 14. VP of Human Resources → NO_SENIORITY (Finding 10)
  - description: "ROLE-14: VP of Human Resources → NO_SENIORITY (not engineering)"
    vars:
      job_title: "VP of Human Resources"
      job_location: "London, United Kingdom"
      jd_text: "VP of Human Resources to build our people operations function. CIPD qualified. 10+ years HR leadership in tech companies."
    assert:
      - type: javascript
        value: "JSON.parse(output).role === 'NO_SENIORITY'"

  # 15. Full Stack Developer → MID_LEVEL
  - description: "ROLE-15: Full Stack Developer → MID_LEVEL"
    vars:
      job_title: "Full Stack Developer"
      job_location: "London, United Kingdom"
      jd_text: "Full Stack Developer for our fintech platform. React, Node.js, TypeScript, PostgreSQL. 3-5 years experience."
    assert:
      - type: javascript
        value: "JSON.parse(output).role === 'MID_LEVEL'"

  # ═══════════════════════════════════════════════════════════════════
  # ROLE — Title-mismatch adherence (Finding 19/24)
  # ═══════════════════════════════════════════════════════════════════

  # 16. Title says "Node.JS Engineer" but JD says "Senior Backend Developer"
  - description: "TITLE-16: Node.JS Engineer (JD says Senior Backend Dev) → NOT SENIOR_PLUS"
    vars:
      job_title: "Node.JS Engineer"
      job_location: "London, United Kingdom"
      jd_text: "Senior Backend Developer needed for our fintech platform. You will design and build scalable APIs using Node.js and TypeScript. 5+ years backend experience. £80,000 - £95,000."
    assert:
      - type: javascript
        value: "JSON.parse(output).role !== 'SENIOR_PLUS'"

  # 17. Title says "Software Developer" but JD says "Senior Full-Stack Engineer"
  # "Developer" = engineering, no seniority keyword → fallback.
  # JD first 50 words contain "Senior" → fallback gives MID_LEVEL (NOT SENIOR_PLUS).
  - description: "TITLE-17: Software Developer (JD says Senior Full-Stack) → MID_LEVEL via fallback"
    vars:
      job_title: "Software Developer (remote)"
      job_location: "Remote"
      jd_text: "Senior Full-Stack Engineer for our AI platform. We need someone who can build end-to-end features. React, Python, AWS. 6+ years experience."
    assert:
      - type: javascript
        value: "JSON.parse(output).role === 'MID_LEVEL'"

  # 18. Title says "Data Scientist" but JD says "Data Scientist III"
  - description: "TITLE-18: Data Scientist (JD says Data Scientist III) → NOT SENIOR_PLUS"
    vars:
      job_title: "Data Scientist"
      job_location: "Cambridge, United Kingdom"
      jd_text: "Data Scientist III position on our recommendations team. Build ML models for personalisation. Python, TensorFlow, Spark. 4+ years experience."
    assert:
      - type: javascript
        value: "JSON.parse(output).role !== 'SENIOR_PLUS'"

  # ═══════════════════════════════════════════════════════════════════
  # TECH — AI/ML discrimination (Finding 17)
  # ═══════════════════════════════════════════════════════════════════

  # 19. ML experience required → AI_ML
  - description: "TECH-19: ML required in requirements → includes AI_ML"
    vars:
      job_title: "Software Engineer"
      job_location: "London, United Kingdom"
      jd_text: "Software Engineer for our ML platform. Requirements: 3+ years Python, experience building machine learning models, MLOps pipelines. You will train and deploy production ML models."
    assert:
      - type: javascript
        value: "['AI_ML','JS_TS_AI_ML','NODE_AI_ML','NODE_JS_TS_AI_ML'].includes(JSON.parse(output).tech)"

  # 20. "AI-powered company" in company description → NOT AI_ML
  - description: "TECH-20: AI in company desc only → no AI_ML"
    vars:
      job_title: "Backend Engineer"
      job_location: "London, United Kingdom"
      jd_text: "We are an AI-powered analytics company transforming how businesses make decisions. Backend Engineer to build our data pipeline. Requirements: Python, PostgreSQL, Redis, Docker. 3+ years experience."
    assert:
      - type: javascript
        value: "!['AI_ML','JS_TS_AI_ML','NODE_AI_ML','NODE_JS_TS_AI_ML'].includes(JSON.parse(output).tech)"

  # 21. ML as nice-to-have → NOT AI_ML
  - description: "TECH-21: ML as nice-to-have → no AI_ML"
    vars:
      job_title: "Software Engineer"
      job_location: "London, United Kingdom"
      jd_text: "Software Engineer for our data platform. Requirements: Python, SQL, Airflow, dbt. Nice to have: experience with machine learning, Kubernetes. 3+ years experience."
    assert:
      - type: javascript
        value: "!['AI_ML','JS_TS_AI_ML','NODE_AI_ML','NODE_JS_TS_AI_ML'].includes(JSON.parse(output).tech)"

  # ═══════════════════════════════════════════════════════════════════
  # COMP — Ignore rules (Batch F/J patterns)
  # ═══════════════════════════════════════════════════════════════════

  # 22. GBP range £85k-£95k → RANGE_75_99K
  - description: "COMP-22: £85,000-£95,000 → RANGE_75_99K"
    vars:
      job_title: "Senior Software Engineer"
      job_location: "London, United Kingdom"
      jd_text: "Senior Software Engineer. Node.js, TypeScript. Salary: £85,000 - £95,000 per annum. Hybrid working."
    assert:
      - type: javascript
        value: "JSON.parse(output).comp === 'RANGE_75_99K'"

  # 23. TC £120,000 → NO_GBP (total compensation ignored)
  - description: "COMP-23: TC £120,000 → NO_GBP (TC ignored)"
    vars:
      job_title: "Senior Software Engineer"
      job_location: "London, United Kingdom"
      jd_text: "Senior Software Engineer. Node.js, React. TC £120,000 (base + bonus + equity). Hybrid working."
    assert:
      - type: javascript
        value: "JSON.parse(output).comp === 'NO_GBP'"

  # 24. OTE £110,000 → NO_GBP (on-target earnings ignored)
  - description: "COMP-24: OTE £110,000 → NO_GBP (OTE ignored)"
    vars:
      job_title: "Senior Software Engineer"
      job_location: "London, United Kingdom"
      jd_text: "Senior Software Engineer. Python, Django. OTE £110,000. Base salary competitive."
    assert:
      - type: javascript
        value: "JSON.parse(output).comp === 'NO_GBP'"

  # 25. £500/day → NO_GBP (daily rate ignored)
  - description: "COMP-25: £500/day → NO_GBP (daily rate ignored)"
    vars:
      job_title: "Contract DevOps Engineer"
      job_location: "London, United Kingdom"
      jd_text: "Contract DevOps Engineer. AWS, Terraform, Kubernetes. £500/day inside IR35. 6-month initial contract."
    assert:
      - type: javascript
        value: "JSON.parse(output).comp === 'NO_GBP'"

  # 26. $110,000-$125,000 (USD on London job) → NO_GBP
  - description: "COMP-26: USD salary on London job → NO_GBP"
    vars:
      job_title: "Software Engineer"
      job_location: "London, United Kingdom"
      jd_text: "Software Engineer for our London office. React, TypeScript. Salary: $110,000 - $125,000. US benefits package."
    assert:
      - type: javascript
        value: "JSON.parse(output).comp === 'NO_GBP'"

  # 27. Total package £130,000 including benefits → NO_GBP
  - description: "COMP-27: Package £130k including benefits → NO_GBP"
    vars:
      job_title: "Senior Engineer"
      job_location: "London, United Kingdom"
      jd_text: "Senior Engineer. Java, Spring Boot. Total package £130,000 including benefits, pension, and annual bonus."
    assert:
      - type: javascript
        value: "JSON.parse(output).comp === 'NO_GBP'"

  # 28. "We manage £2bn in assets" → NO_GBP (non-salary £)
  - description: "COMP-28: Non-salary £ amount → NO_GBP"
    vars:
      job_title: "Software Engineer"
      job_location: "London, United Kingdom"
      jd_text: "Software Engineer at a leading asset manager. We manage £2bn in assets across 15 funds. Python, React, AWS. Competitive salary."
    assert:
      - type: javascript
        value: "JSON.parse(output).comp === 'NO_GBP'"
