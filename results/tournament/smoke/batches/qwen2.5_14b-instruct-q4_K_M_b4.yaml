    jd_text: "About the job                                                               Senior Software EngineerLocation: London - HybridSalary: £70,000-85,000Tech stack: Typescript & Node.jsMaxwell Bond have partnered with a leading SaaS business who are looking for a Senior Software Engineer, with a focus on frontend development, to join their team. You'll work on one of the largest complex platforms for an enterprise client, being hands-on throughout the full software development lifecycle.What you'll do as Senior Software Engineer:      Design, build and maintain full stack development for an enterprise platform, taking ownership from initial design through to production.Work with modern tech stack with a focus on frontend development, using Typescript and Node.js and utilise LLM/AI tools and techniques.Collaborate with DevOps Engineers and QA Engineers on building pipelines, conducting testing where required and communicate directly with stakeholders. What's in it for you:      Salary up to £85,000Annual Allowance for training.24 days holidays + Bank Holidays + Birthday off.Stock option plans + health insurance. What they're looking for as Senior Software Engineer:      7+ years' experience as a Full-Stack Engineer, with 3+ years hands-on experience working with Typescript, Node.js & React.Proven experience working the full end-to-end development on large complex platforms, with ability to communicate with external stakeholders.Experience implementing AI into development is advantageous. This is a great opportunity to join a collaborative team on their growth journey, so if you're an experience Senior Software Engineer, apply now!!                                                                                                                              See more"
