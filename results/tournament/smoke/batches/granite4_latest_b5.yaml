      **About Spencer Inc**
      We are an innovative team building a consumer fintech app revolutionizing micro-investing. We're looking for a Backend Systems Developer who is passionate about building world-class products.

      **The Role**
      As our Backend Systems Developer, you will be:
      - architecting scalable backend systems from scratch
      - ensuring 99.99% uptime for mission-critical services
