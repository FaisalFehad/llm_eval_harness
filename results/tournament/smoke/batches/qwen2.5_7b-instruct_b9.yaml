    jd_text: "Location: Remote (United States) Employment Type: Full-time Build End-to-End Products Used by Businesses Worldwide We are hiring Full Stack Engineers on behalf of a fast-growing, venture-backed B2B technology company. The engineering team is expanding to support new product initiatives and increasing customer demand. This role involves working across the stack to design, build, and maintain user-facing features and the backend systems that power them. Candidates who enjoy owning features from concept to deployment are encouraged to apply. What You’ll Do • Design, develop, and maintain full-stack features and applications • Build responsive user interfaces and robust backend services • Develop and integrate APIs and data storage solutions • Collaborate with product managers, designers, and other engineers • Participate in code reviews and contribute to engineering standards • Debug issues across the stack and improve performance and reliability • Write clean, maintainable, well-tested code • Contribute to technical discussions and architectural decisions Preferred Technical Experience • Modern frontend frameworks (e.g., React, Angular, or similar) • Backend development using Node.js, Python, Java, Go, or comparable technologies • Working with RESTful APIs and databases (SQL or NoSQL) • Experience with TypeScript or modern JavaScript ecosystems Experience with one or more frontend and backend technologies is typically sufficient. Equivalent experience with similar tools will also be considered. Who Should Apply • Engineers with experience delivering end-to-end software solutions • Developers comfortable working across both frontend and backend layers • Problem solvers who can balance usability, performance, and reliability • Professionals who communicate clearly and collaborate effectively • Candidates able to manage tasks independently in a remote environment Nice to Have • Experience with cloud platforms (e.g., AWS, Azure, or GCP) • Familiarity with containerization and CI/CD pipelines • Understanding of microservices or modular architectures • Experience building customer-facing web applications What You’ll Gain • Opportunity to build features used by real business customers • Exposure to modern development tools and practices • Collaborative environment with cross-functional teams • Ability to influence product direction and technical decisions • Experience working in a fast-paced startup environment Compensation & Benefits • Competitive base salary • Performance-based compensation components where applicable • Benefits package provided by the employer • Remote work flexibility within the United States Specific compensation details will be discussed during the hiring process and are aligned with experience and market benchmarks. Hiring Process Qualified candidates may be invited to complete an initial screening, which may include a structured interview and/or role-relevant technical assessment. Selected candidates will proceed to interviews with the engineering team. Equal Opportunity Employer The employer is committed to providing equal employment opportunities to all qualified applicants without regard to race, color, religion, sex, sexual orientation, gender identity, national origin, disability, veteran status, or other protected characteristics. … more"
