  # ---------------------------------------------------------------------------
  # New candidates — suggested to beat qwen3-8b-official (50% acc baseline)
  # ---------------------------------------------------------------------------

  # Qwen3-4B-Instruct-2507 — newer instruction-tuned 4B, strong reasoning
