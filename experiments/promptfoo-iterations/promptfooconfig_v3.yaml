# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "Job-fit scorer — v3 compact (trimmed v2-strict, same bias fixes, fewer tokens)"

# ---------------------------------------------------------------------------
# Prompt — v3 compact
# Keeps v2-strict fixes (no inflation, salary=0 if missing, label must match)
# but trimmed to fit 4B models at reduced context.
# ---------------------------------------------------------------------------
prompts:
  - label: "job-fit-scorer-v3-compact"
    raw: |
      You are a strict job-fit scorer. Score ONLY what the job description explicitly states — do not assume or inflate.

      Candidate: UK-based senior/staff backend engineer (TypeScript, Node.js, Python, AI/ML interest). Remote UK/global or hybrid London. Salary £75k+ GBP.

      Rubric — sum four categories (floor 0, cap 100):

      1. Role & Seniority (max 25):
         +25: Senior, Staff, Principal, Lead, Tech Lead
         +15: Full Stack, Mid-Level, SWE II
         0: Junior, management-only, non-engineering

      2. Tech Stack (max 25, points stack):
         +10: Node.js required
         +5: JavaScript or TypeScript required
         +10: AI/ML/LLM mentioned

      3. Location (max 25):
         +25: Remote (UK/global) or hybrid London
         +10: Hybrid/on-site UK outside London
         0: Not stated
         -50: Outside UK

      4. Compensation (max 25):
         +25: £100k+
         +15: £75k–£99k
         +5: £55k–£74k
         0: Not listed (do NOT guess)
         -30: Below £45k

      Label (MUST match score): good_fit 70–100, maybe 50–69, bad_fit 0–49

      Respond ONLY with JSON:
      {"label":"good_fit|maybe|bad_fit","score":<0-100>,"reasoning":"<1-2 sentences>"}

      Job description:
      {{jd_text}}

# ---------------------------------------------------------------------------
# Providers — same as v1/v2
# ---------------------------------------------------------------------------
providers:
  # Teacher model — best accuracy from smoke test (50%, 14.1s/job via llama.cpp)
  - id: "node-llama-cpp:qwen3-8b"
    config:
      hf_model: "hf:Qwen/Qwen3-8B-GGUF:Q4_K_M"
      temperature: 0
      no_think: true

  # Student model — distillation target (1.1s/job, near-zero bias, 3/3 maybe detection)
  - id: "node-llama-cpp:granite4-350m"
    config:
      hf_model: "hf:ibm-granite/granite-4.0-350m-GGUF"
      temperature: 0

  # ---------------------------------------------------------------------------
  # Previously tested via llama-server (openai-compat) — now native node-llama-cpp
  # ---------------------------------------------------------------------------

  # janhq/Jan-v3-4B — strongest result per parameter (40% acc, 0% parse fail, 9.6s/job)
  - id: "node-llama-cpp:jan-v3-4b"
    config:
      hf_model: "hf:janhq/Jan-v3-4B-base-instruct"
      no_think: true
      temperature: 0

  - id: "node-llama-cpp:jan-v3-4b-suggested"
    config:
      hf_model: "hf:janhq/Jan-v3-4B-base-instruct"
      no_think: true
      temperature: 0.7
      top_p: 0.8
      top_k: 20

  # Rubric-aware reasoning, correct maybe detection (1/3), converted USD→GBP

  # granite-4.0-350m at temp 0.5 — anomalous: 3/3 maybe correct, near-zero bias (-2.8)
  - id: "node-llama-cpp:granite4-350m-warm"
    config:
      hf_model: "hf:ibm-granite/granite-4.0-350m-GGUF"
      temperature: 0.5

  # qwen3-8b unsloth GGUF — 40% acc, rubric-then-override bug, needs CoT prompt fix
  - id: "node-llama-cpp:qwen3-8b-unsloth-nothink-true"
    config:
      hf_model: "hf:unsloth/Qwen3-8B-GGUF"
      temperature: 0
      no_think: true

  - id: "node-llama-cpp:qwen3-8b-unsloth-nothink-false"
    config:
      hf_model: "hf:unsloth/Qwen3-8B-GGUF"
      temperature: 0
      no_think: false

  # qwen3-8b official GGUF — best of llama.cpp batch (50% acc, 0% parse fail, 14.1s/job)
  - id: "node-llama-cpp:qwen3-8b-official"
    config:
      hf_model: "hf:Qwen/Qwen3-8B-GGUF"
      temperature: 0
      no_think: true

  - id: "node-llama-cpp:qwen3-8b-official-nothink-false"
    config:
      hf_model: "hf:Qwen/Qwen3-8B-GGUF"
      temperature: 0
      no_think: false

  # failed
