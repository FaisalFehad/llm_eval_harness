# MLX LoRA config for V13 student model — Qwen3-0.6B
# Fresh retrain from base with updated prompt (student_v13.txt).
# Training data: 842 jobs (790 original + 52 contrastive sen/loc examples).
#
# Same hyperparameters as V12 0.6B (which produced 0 parse failures).
# max_seq_length bumped to 8192 (new prompt is longer, some JDs exceed 5120).
# Optimizer: AdamW (decoupled weight decay) instead of V12's default Adam.
#
# Training: FRESH from base (no resume_adapter_file)

model: "mlx-community/Qwen3-0.6B-4bit"
data: "data/v13/mlx"
train: true
fine_tune_type: "lora"

optimizer: "adamw"
optimizer_config:
  adamw:
    weight_decay: 0.01

lora_parameters:
  rank: 16
  alpha: 32
  dropout: 0.05
  scale: 1.0

batch_size: 1
grad_accumulation_steps: 16
iters: 3000
learning_rate: 2e-5
warmup_steps: 100

max_seq_length: 8192

val_batches: 40
steps_per_eval: 25

adapter_path: "finetune/adapters_v13_0.6B"
save_every: 50

mask_prompt: true
grad_checkpoint: true
