# MLX LoRA config for V6 student model (semantic tokens)
# Optimized for M1 16GB — OOM-safe with batch_size=1, grad_accum=16
#
# Student: Qwen2.5-0.5B-Instruct-4bit
# Task: Semantic token classification (4 fields, 21 total tokens)
# Training: 60 new H/I/J jobs only (V5.1 knowledge lives in resumed adapter)
# Resume: from V5.1 best checkpoint (iter 875)
#
# Key changes from V5.1:
#   - batch_size: 2 → 1   (OOM prevention — V5.1 crashed at iter 890)
#   - grad_accumulation_steps: 8 → 16  (same effective batch=16)
#   - iters: 1000 → 1200  (60 examples only — less data, fewer passes needed)
#   - save_every: 25 → 50  (fewer checkpoint files)
#   - steps_per_eval: 25 → 50  (matches save cadence)
#   - data: data/v5/mlx → data/v6/mlx  (new training pool with H/I/J)
#   - adapter_path: finetune/adapters_v6  (fresh output directory)
#
# TRAINING COMMAND:
#   python -m mlx_lm.lora \
#     --config finetune/lora_config_v6.yaml \
#     --resume-adapter-file finetune/adapters_v5.1/0000875_adapters.safetensors
#
# EVAL COMMAND (after training, per checkpoint):
#   python finetune/eval_student.py \
#     --adapter finetune/adapters_v6/XXXXXXXXX_adapters.safetensors \
#     --test-file data/v5/eval_150_golden.jsonl \
#     --prompt prompts/student_v5.txt

model: "mlx-community/Qwen2.5-0.5B-Instruct-4bit"
data: "data/v6/mlx"
train: true
fine_tune_type: "lora"

# LoRA hyperparameters — same as V5.1
# rank 16: enough capacity for 21-class semantic token classification
# alpha = 2x rank for stable scaling
lora_parameters:
  rank: 16
  alpha: 32
  dropout: 0.1
  scale: 1.0
  weight_decay: 0.01

# Training parameters
batch_size: 1                  # Reduced from 2 — prevents OOM on M1 16GB
grad_accumulation_steps: 16   # Increased from 8 — effective batch = 16 (same as before)
iters: 1200                   # Reduced from 1500 — 60 examples × 1200 iters at effective batch=16 ≈ 300 passes
learning_rate: 5e-5
warmup_steps: 50

max_seq_length: 8192

# Validation — eval every 50 iters (matches save cadence)
val_batches: 40
steps_per_eval: 50

# Output
adapter_path: "finetune/adapters_v6"
save_every: 50

# Memory optimization
mask_prompt: true         # Only train on assistant response (semantic tokens)
grad_checkpoint: true     # Gradient checkpointing — critical for M1 16GB
