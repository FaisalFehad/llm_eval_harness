# MLX LoRA config for V7 student model — 1.5B variant
# Optimized for M1 16GB
#
# Student: Qwen2.5-1.5B-Instruct-4bit (3x larger than 0.5B)
# Task: Semantic token classification (5 fields, 10 JSON keys)
#   loc (5) + arr (4) + sen (3) + tech (5 individual, arrays) + comp (7)
# Training: fresh LoRA from base (NEVER resume from existing adapter)
# Same hyperparameters as 0.5B config for fair comparison

model: "mlx-community/Qwen2.5-1.5B-Instruct-4bit"
data: "data/v7/mlx"
train: true
fine_tune_type: "lora"

# LoRA hyperparameters — identical to 0.5B for fair comparison
lora_parameters:
  rank: 16
  alpha: 32
  dropout: 0.05
  scale: 1.0
  weight_decay: 0.0

# Training parameters — identical to 0.5B
batch_size: 1
grad_accumulation_steps: 16 # Effective batch = 16
iters: 2000
learning_rate: 2e-5
warmup_steps: 100

max_seq_length: 8192

# Validation
val_batches: 40
steps_per_eval: 25

# Output — separate adapter directory from 0.5B
adapter_path: "finetune/adapters_v7_1.5B"
save_every: 50

# Memory optimization
mask_prompt: true
grad_checkpoint: true
