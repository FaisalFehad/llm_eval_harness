# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "Job-fit scorer — local Ollama model comparison"

# ---------------------------------------------------------------------------
# Prompt
# ---------------------------------------------------------------------------
prompts:
  - label: "job-fit-scorer-v1"
    raw: |
      You are a job-fit scoring assistant for a senior software engineer job search.

      Candidate profile:
      - Based in the UK; open to remote (UK or global) or hybrid roles in London/major UK cities
      - Targeting: Senior, Staff, Principal, or Lead Software Engineer (backend or full-stack)
      - Preferred stack: Node.js, TypeScript, JavaScript
      - Interested in AI/ML/LLM roles
      - Salary target: £75,000+ GBP
      - Not interested in: management-only roles, non-engineering roles, or on-site roles outside the UK

      Score this job 0–100 using the four categories below. Sum the points (floor 0, cap 100).

      1. Role & Seniority (max 25 pts):
         +25: Senior, Staff, Principal, Lead, or Tech Lead Engineer
         +15: Full Stack, Mid-Level, or Software Engineer II
         0: Junior, management-only (EM), or non-engineering roles

      2. Tech Stack & Domain (max 25 pts, points stack, cap at 25):
         +10: Node.js explicitly required
         +5: JavaScript or TypeScript explicitly required
         +10: AI, ML, or LLM experience explicitly mentioned

      3. Location & Work Arrangement (max 25 pts):
         +25: Fully remote (UK-based or global) OR hybrid in London
         +10: Hybrid or on-site in UK outside London
         0: Location unknown
         -50: Hybrid or on-site outside the UK

      4. Compensation (max 25 pts):
         +25: Base salary £100k+
         +15: Base salary £75k–£99k
         +5: Base salary £55k–£74k
         0: Salary unknown or not listed
         -30: Base salary below £45k

      Label mapping:
      - good_fit (70–100)
      - maybe (50–69)
      - bad_fit (0–49)

      Respond ONLY with a valid JSON object. No markdown, no extra text.
      Format: {"label": "good_fit|maybe|bad_fit", "score": <integer 0-100>, "reasoning": "<1-2 sentences>"}

      Job description:
      {{jd_text}}

# ---------------------------------------------------------------------------
# Providers — local Ollama
# format: json enables Ollama's JSON mode (forces valid JSON output)
# temperature: 0 for deterministic scoring
# ---------------------------------------------------------------------------
providers:
  # Best instruct models — recommended starting point
  - id: ollama:chat:qwen2.5:7b-instruct
    config:
      format: json
      temperature: 0

  - id: ollama:chat:qwen2.5:14b-instruct-q4_K_M
    config:
      format: json
      temperature: 0

  - id: ollama:chat:qwen3:8b
    config:
      format: json
      temperature: 0

  - id: ollama:chat:mistral-nemo:latest
    config:
      format: json
      temperature: 0

  # Smaller / faster — good for speed vs. quality trade-off analysis
  - id: ollama:chat:qwen3:1.7b
    config:
      format: json
      temperature: 0

  - id: ollama:chat:ministral-3:3b
    config:
      format: json
      temperature: 0

  - id: ollama:chat:granite4:latest
    config:
      format: json
      temperature: 0

  # Other instruction-tuned models
  - id: ollama:chat:wizardlm2:latest
    config:
      format: json
      temperature: 0

  # cloud-only models (not local):
  - id: ollama:chat:mistral-openorca:7b
    config:
      format: json
      temperature: 0

  - id: ollama:chat:mistral-large-3:675b-cloud
    config:
      format: json
      temperature: 0

  - id: ollama:chat:ministral-3:14b-cloud
    config:
      format: json
      temperature: 0

  - id: ollama:chat:minimax-m2.5:cloud
    config:
      format: json
      temperature: 0

  # very small
  - id: ollama:chat:granite4:350m # too small (350M params)
    config:
      format: json
      temperature: 0

  - id: ollama:chat:llama3.2:1b # too small for reliable JSON scoring
    config:
      format: json
      temperature: 0

  - id: ollama:chat:dolphin-llama3:latest # uncensored fine-tune, less reliable structured output
    config:
      format: json
      temperature: 0

  - id: ollama:chat:llama2:7b # old model, poor instruction following
    config:
      format: json
      temperature: 0

  # ---------------------------------------------------------------------------
  # Excluded — see comments
  # ---------------------------------------------------------------------------
  # - id: ollama:chat:deepseek-coder:6.7b      # coding specialist, not ideal for JD analysis
  # - id: ollama:chat:qwen2.5-coder:7b         # coding specialist
  # - id: ollama:completion:llama-pro:text      # base completion model, needs different prompt format

# ---------------------------------------------------------------------------
# Tests — loaded from the pre-built golden dataset
# ---------------------------------------------------------------------------
tests:
  - file://data/promptfoo_tests.yaml
