# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "Job-fit scorer — v5 — tuned candidate profile, strict scoring"

# ---------------------------------------------------------------------------
# Prompt — v5
# ---------------------------------------------------------------------------
prompts:
  - label: "job-fit-scorer-v5"
    raw: |
      You are a strict job‑fit scorer for one candidate. Score ONLY what is explicitly stated. Do NOT infer missing info.
      
      Use ONLY these fields:
      - Job title: {{job_title}}
      - Job location: {{job_location}}
      - Job description: {{jd_text}}
      
      Field rules (no exceptions):
      - Role & Seniority: use ONLY job_title (ignore jd_text).
      - Location: use job_location, but override to outside‑UK if jd_text explicitly states a non‑UK location.
      - Tech Stack: use ONLY jd_text (ignore job_title).
      - Compensation: use ONLY jd_text (ignore job_title).
      
      Scoring rubric — sum four categories (floor 0, cap 100):
      
      1) Role & Seniority (max 25) — based on job_title only
      +25 if title contains ANY of: Senior, Staff, Principal, Lead, Tech Lead, Head, Distinguished, VP, Snr
      +15 if title contains ANY of: Full Stack / Full‑Stack / Fullstack, Mid‑Level / Mid Level / Midlevel, Software Engineer II / Engineer II / SWE II
      0 otherwise
      Important: Do NOT give +15 for “Engineer”, “Developer”, “Backend”, “Frontend”, “Architect”, “Manager”, or “Product” unless a +25/+15 keyword above appears.
      Exception: If title contains “Founding Software Engineer”, role points = 0.
      
      2) Tech Stack (max 25, points stack; cap at 25) — based on jd_text only
      +10: “Node.js”/“NodeJS” explicitly required or listed in core stack/requirements
      +5: “JavaScript” or “TypeScript” explicitly required or listed in core stack/requirements
      +10: AI/ML/LLM experience explicitly required (phrases like “experience with AI/ML/LLM”, “LLM integrations”, “ML models”, “AI/ML required”)
      Do NOT give AI points if AI is only mentioned in company description, mission, market, or “interest in AI/tools”.
      
      3) Location & Work Arrangement (max 25)
      - If jd_text explicitly states a non‑UK location (e.g., United States/USA/US, Middle East, Germany, Netherlands, Australia, India, Berlin, Amsterdam, Helsinki, Cape Town, Sydney, Bangalore), then location = -50.
      Else use job_location:
        +25: Remote (UK/England/Scotland/Wales/Northern Ireland/Global) OR hybrid/on‑site in London
        +10: Hybrid/on‑site in UK outside London (UK/United Kingdom/England/Scotland/Wales/Northern Ireland or UK cities)
        0: Location missing or unclear
        -50: Location explicitly outside the UK
      
      4) Compensation (max 25) — base salary in GBP only (from jd_text)
      - Only count base salary in GBP explicitly stated as salary/compensation.
      - Ignore bonuses, equity, benefits, allowances, budgets, and non‑GBP amounts.
      - If salary uses “k” notation (e.g., £100k, £80k‑150k, “up to £150K”), treat as below £45k (‑30).
      - If a GBP range is given with full numbers (e.g., £90,000‑£105,000), use the midpoint.
      +25: midpoint ≥ £100k
      +15: midpoint £75k–£99k
      +5: midpoint £55k–£74k
      -30: midpoint < £45k
      0: salary not stated
      
      Label mapping (must match score):
      - good_fit: 70–100
      - maybe: 50–69
      - bad_fit: 0–49
      
      Return ONLY JSON:
      {"label":"good_fit|maybe|bad_fit","score":0-100,"reasoning":"1-2 sentences including role/stack/location/comp points and total"}

# ---------------------------------------------------------------------------
# Providers — same as v1/v2
# ---------------------------------------------------------------------------
providers:
  # Teacher model — best accuracy from smoke test (50%, 14.1s/job via llama.cpp)
  - id: "node-llama-cpp:qwen3-8b"
    config:
      hf_model: "hf:Qwen/Qwen3-8B-GGUF:Q4_K_M"
      temperature: 0
      no_think: true

  # Student model — distillation target (1.1s/job, near-zero bias, 3/3 maybe detection)
  - id: "node-llama-cpp:granite4-350m"
    config:
      hf_model: "hf:ibm-granite/granite-4.0-350m-GGUF"
      temperature: 0

  # ---------------------------------------------------------------------------
  # Previously tested via llama-server (openai-compat) — now native node-llama-cpp
  # ---------------------------------------------------------------------------

  # janhq/Jan-v3-4B — strongest result per parameter (40% acc, 0% parse fail, 9.6s/job)
  - id: "node-llama-cpp:jan-v3-4b"
    config:
      hf_model: "hf:janhq/Jan-v3-4B-base-instruct"
      no_think: true
      temperature: 0

  - id: "node-llama-cpp:jan-v3-4b-suggested"
