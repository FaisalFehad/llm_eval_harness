, technical decisions, and engineering standards You’ll play a key role in ensuring Happl’s backend scales as our customer base, features, and global footprint grow.What We’re Looking For      4+ years experience as a Backend or Software EngineerStrong experience with modern backend languages and frameworks (e.g. Typescript, Golang)Experience designing and consuming APIs (REST, event-driven systems)Solid understanding of databases (SQL / PostgreSQL) and data modellingExperience building and scaling production systemsFamiliarity with cloud infrastructure and CI/CD workflowsComfortable working with integrations and third-party servicesExperience using AI tools (e.g. ChatGPT, Claude) as part of your workflowClear communicator who works well with both technical and non-technical stakeholdersProactive, detail-oriented, and comfortable taking ownership If you don’t meet every requirement but feel this role fits your trajectory, we’d still love to hear from you.Why join Happl      Help shape the future of employee benefitsCompetitive base salary and commissionMeaningful equity in an early stage growing businessFlexible hybrid working from day oneAccess to your own Happl benefits platformOptional enrolment in Private Health InsuranceOptional enrolment in Dental insurance, including family coverA flexible Wellbeing budget to spend on whatever wellbeing means to youLearning & Development (L&D) allowancePension scheme from day oneRapid career progression in a scaling commercial team About The Interview      Call 1: 20-min Intro call with Ben (COO & CoS)Call 2: 30-min deep dive with Lee (Head of Engineering)Short TaskCall 3: 30-min deep dive with Ben T (CEO & Founder) Additional DetailsLocation: London, WaterlooTeam: EngineeringWorking arrangement: Hybrid (3+ Days in Office)#BS-L1                                                                                                                              See more"
