- description: 4370762203 | Senior Software Engineer @ Ripple
  vars:
    jd_text: "About the job                                                               At Ripple, we’re building a world where value moves like information does today. It’s big, it’s bold, and we’re already doing it. Through our crypto solutions for financial institutions, businesses, governments and developers, we are improving the global financial system and creating greater economic fairness and opportunity for more people, in more places around the world. And we get to do the best work of our career and grow our skills surrounded by colleagues who have our backs. If you’re ready to see your impact and unlock incredible career growth opportunities, join us, and build real world value. THE WORK:Ripple is an established fintech company revolutionizing global finance with blockchain technology, offering a wide variety of financial services, including cross-border payments, institutional crypto liquidity, digital asset custody, and our enterprise-grade stablecoin RLUSD. As a Software Engineer at Ripple, you'll work on payment technologies, building scalable solutions that power the future of finance.Your primary responsibilities will be for a core part of the Payments offerings, Bank Integrations. This means serving as the single connectivity layer to banking partners, ensuring that data exchanged with external financial institutions remains correct, reliable, and always available. You will be responsible for facilitating the smooth distribution of this data from the connectivity layer to other parts of the company, powering both live production payment flows and reconciliation operations. The work includes maintaining and strengthening integrations with banking partners, resolving technical debt to improve stability, and evolving the platform to meet new business and compliance requirements. By advancing an already established production system, you will play a key role in increasing scale, efficiency, and observability, ensuring Ripple products interact seamlessly with global banks and payment providers in a consistent and trustworthy way.We are looking for a software engineer passionate about learning and understanding the way a complex fintech system works end-to-end and can help drive forward the development. A passion for making systems better and getting to the optimal solution with the right level of trade-offs is what will make you successful in this role.WHAT YOU’LL DO:      Integrate with new bank APIs and normalize to the internal system schema. Solving any bespoke integration approaches that will come up.Advance the system forward to an optimal state with clear boundaries and responsibilitiesWork on our internal trading system (Prisma)Work on a variety of challenges spanning crypto, trading, fintech, and payment solutions.Fully integrate into a large system and spot opportunities for improvements and best practices.Prototype new solutions for complex software problems and implement them for production cloud deployments WHAT YOU'LL BRING:       Experience building highly scalable and performant enterprise softwareWorking knowledge of Java and its ecosystem (i.e. threading, concurrency ... etc).A positive attitude and a passion for sharing knowledge - the go-to person on the team for small and large questionsInterest in fintech, markets, and trading is a must.knowledge or high interest in our main tools: Java, event-driven architectures (AMQP or similar), gRPC, service meshes, etc.Obsession with finishing projects properly, with good stakeholder management, communications, and documentation.  WHO WE ARE:Do Your Best Work      The opportunity to build in a fast-paced start-up environment with experienced industry leadersA learning environment where you can dive deep into the latest technologies and make an impact. A professional development budget to support other modes of learning.Thrive in an environment where no matter what race, ethnicity, gender, origin, or culture they identify with, every employee is a respected, valued, "
