ing with the command lineStrong written communication skills both technical and non-technicalStrong interest and knowledge in a variety of sports in particular tennis Desirable      Experience working with sports dataFamiliarity with a version control system e.g. Git, and standard code repository workflows & processesExperience with writing unit/integration testsExperience working with and developing CI/CD pipelinesExperience with message broker technologies such as Redis, Kafka etc.Experience with Docker and Kubernetes or equivalent About EllipseEllipse is a leading sports data and analytics company comprising CricViz, FootballViz, Horse Racing, RugbyViz (Oval Insights, Stuart Farmer Media Services) and TennisViz. Working with the world’s biggest broadcasters, professional teams and rights holders, we simplify complex data to engage a broad and diverse audience and tell better stories about the sports we love.                                                                                                                              See more
