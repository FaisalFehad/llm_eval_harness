ween client-side applications and backend services.Collaborate with team leaders, data scientists, analysts, and application engineers to translate business requirements into well-designed backend and front end capabilities.Ability & willingness to provide support to the customers on an ongoing basis for self-developed & team-developed features, and ensure high availability of the Horse Racing systems, for our customers Role Requirements:       4–6 years of hands-on experience building and operating Frontend and Backend systems in production, using React, Python, AWS & SQLAbility to work with UX Designers, performing analysis of the front end designs, providing inputs to avoid UI rework and deep understanding of portal development will be a key for this rolePractical experience in all stages of the Product Development Life Cycle is required (design, build, test, deploy, rollback), with good understanding in identifying tech-debts, automation testing, working with monitoring tools and application workload management is expectedSolid Python development experience for data processing, services, and automation.Strong working knowledge of SQL for data transformation, validation, and analytics.Experience building, integrating, or consuming REST APIs for data access and system integration.Good understanding of system reliability, monitoring, security, and scalability in cloud-native environments. Nice to have:       Experience deploying and managing services on AWS EKS / Kubernetes, including containerized workloads would be a strong advantageExperience with infrastructure as code (Terraform, CloudFormation, or similar) for managing cloud and Kubernetes resources and streaming or near-real-time data systems (Kafka, Kinesis, event-driven architectures) will be a big plus for the roleFamiliarity with observability tools (CloudWatch) and production troubleshooting for the same will be an added advantage Equality & diversityEllipse is committed to building an open and inclusive culture that"
