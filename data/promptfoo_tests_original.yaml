- description: 4371310707 | Lead Software Engineer @ Circuit Mind
  vars:
    jd_text: "About the job                                                               Electronic circuit boards are at the core of current and future inventions - mobile phones, augmented reality, autonomous vehicles and spacecrafts. Yet today designing an electronic circuit board is an extremely manual, long and tedious process. At Circuit Mind we believe that this is wrong and we are on a mission to fix it, triggering the future of hardware design.Taking inspiration from the integrated circuit workflow (hardware description language, logic synthesis, automated place and route), we are creating an entirely new software engine for circuit boards, that takes as inputs the requirements of a circuit board and automatically outputs a complete design, ready for manufacture.As a Lead Software Engineer, you’ll take full ownership of the development of large pieces of functionality across the back-end stack of Circuit Mind's products. You will collaborate closely with a team of other lead engineer-level individual contributors.Responsibilities      Collaborate with the product team and the hardware team to understand the problems of hardware engineering teams.Plan, design, develop, test and iterate on the software solutions to those problems, accounting for functional and non-functional requirements.Co-design, pair on, and review the development work of other lead software developers.The above apply to the entire company's backend code base: data models, algorithms, data pipelines, infrastructure, APIs, complex database queries, ML models.Learn, use, and improve best practices and processes for high-quality software development. Our technology stack includes Python 3.11, PostgreSQL, Django, mypy, GraphQL, Docker, Redis, Typescript, React, Apollo.Qualifications      5+ years of professional software development experience.2+ year of professional experience in Python.Strong communication and team-work skills.Experience working in an agile software development environment. Nice to haves      Experience in a tech lead position.An interest in electronic engineering. Company Benefits      Technical challenges that the world has not solved before and the chance to shape first-hand the electronics revolution.Collaboration with friendly world-class team.Competitive salary and equity.25 days of annual holidays.Flexible working environment.5 weeks per year to work wherever you want in the world.London Bridge office.Extended parental leave.Learning and development budget. Interview Process      45 mins Screening with Operations Manager2 hour Technical Assessment2 hour Experience Interview2 Reference Checks                                                                                                                               See more"
