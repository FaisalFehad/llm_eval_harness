ng team and with users to identify pain points and deliver real value fastYour backgroundFive plus years of engineering experience in product focused environmentsA track record of taking features or products from idea to launchExperience building with LLMs including RAG, semantic search and vector storesHands on with TypeScript, React, Node and PythonComfortable deploying to AWS, GCP or AzureCurious, fast, accountable and motivated by ownership This is a rare chance to join a small founding team, shape the core architecture of a category defining AI platform and drive change in one of the world’s most important and least disrupted industries.                                                                                                                              See more"
