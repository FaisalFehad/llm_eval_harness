  vars:
    jd_text: "About the job                                                               Software Engineer | React / Python | Real-time Data Intelligence PlatformFull stack (flexible on split)Location: Hybrid (London, Oxford or Cambridge)We’re working with an early stage technology company building a production grade data platform for real time systems and analytics at scale. While the business has roots in autonomous systems, the core value sits firmly in the software platform that turns live data into usable insight.As customer adoption grows, the team is expanding its product engineering capability and hiring Software Engineers to help build and evolve customer facing features on top of the core platform.This is a role for full stack Software Engineer who enjoy working across the stack in early stage environments. You will be building real features used by customers, helping shape how new capabilities are developed, and feeding improvements back into the central platform as the product matures.The business is well funded, gaining strong client traction, and building toward a significant scale up phase over the next 12 to 24 months.What you’ll get• Hands on ownership of end to end product features used by real customers• Exposure to a data intensive, real time platform• The chance to shape how new features are built and integrated into the core system• Close collaboration with architecture, cloud, and platform teams• A high ownership engineering environment with room to growWhat you’ll be doing• Building full stack features across React front end and Python backend services• Developing customer focused functionality on top of a shared data platform• Working with AWS infrastructure to deploy and support new capabilities• Collaborating with platform engineers to fold successful features back into the core product• Contributing to code structure, patterns, and engineering standards as the system evolves• Supporting debugging, performance improvements, and production reliability• Working in small teams where engineers own features from design through deliveryThis is not a narrowly siloed role. You will work across front end, backend, and cloud, with flexibility to lean into your strengths while developing breadth across the stack.What we’re looking for• 5+ years working as a Software Engineer building production ready systems• Strong fundamentals in either React front end or Python backend (ideally both), with working ability across both• Practical experience deploying and supporting applications in AWS• Comfort working in early stage environments with ambiguity and high ownership• A production first mindset focused on reliability, clarity, and maintainabilityEngineers may lean slightly frontend or backend, but should be comfortable operating across the stack and collaborating closely with other specialists. The company plans to hire 2-3 so would look to balance the indvidual leaning across the hires.Nice to haves• Experience building customer facing SaaS platforms• Exposure to data heavy or real time systems• Familiarity with modern frontend patterns and API driven architecturesInterested?If you’re looking for a Software Engineer role with real ownership and long term impact, I’d be happy to share more context.Salary: £60,000 to £70,000 plus benefitsImportant:No sponsorship availableApplicants must already be in the UK to apply                                                                                                                              See more"
