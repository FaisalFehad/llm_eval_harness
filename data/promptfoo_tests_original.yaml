- description: 4374501376 | Front End Software Develper @ Oracle
  vars:
    jd_text: "Job Description Join a team that is modernizing healthcare through cloud-native, AI-powered solutions. In this role, you will design and deliver end-to-end experiences — from elegant, accessible user interfaces to resilient services operating at massive scale. You will collaborate closely with Product, UX, and Platform Engineering teams to build secure, high-availability features that clinicians and patients rely on every day. This is a fast-paced, Agile environment with CI/CD best practices, where you will continuously improve code quality, performance, and maintainability. Your work will directly shape intuitive user experiences and robust APIs that power Oracle Health’s mission-critical platforms. Key Responsibilities Develop and maintain large-scale Single Page Applications (SPAs) with robust state management and modular architecture Build responsive, accessible user interfaces that meet WCAG and inclusive design standards Integrate frontend applications with REST and/or GraphQL services, optimizing data fetching and caching strategies Implement comprehensive testing strategies (unit and end-to-end), CI/CD pipelines, performance budgets, and monitoring Partner with UX and design teams to evolve prototypes into production-ready interfaces Contribute to shared design systems, reusable component libraries, and technical documentation Required Qualifications (Experience level scaled based on seniority) Bachelor’s degree in Computer Science or related field (or equivalent practical experience) Demonstrated experience building complex, large-scale frontend applications Expertise in JavaScript/TypeScript (ES6+), React, Redux (or similar state management frameworks) Strong command of HTML5, CSS3 (Sass/Less), responsive design, and cross-browser compatibility Experience with frontend testing frameworks (Jest, Mocha/Chai, React Testing Library, Puppeteer, Cypress, or Selenium) Proficiency with build tools and package managers (Webpack, npm/yarn) and Git-based version control Strong understanding of performance optimization techniques (code splitting, lazy loading, bundle optimization) and frontend security best practices Experience with containerized deployments (Docker/Kubernetes) and CI/CD workflows Preferred Qualifications Experience conducting accessibility audits and using accessibility tooling Familiarity with design tools such as Figma, Sketch, or InVision Backend collaboration experience (Node.js, Express, or Java) Experience with feature flags, A/B testing, and product analytics Qualifications Disclaimer: Certain US customer or client-facing roles may be required to comply with applicable requirements, such as immunization and occupational health mandates. Range and benefit information provided in this posting are specific to the stated locations only US: Hiring Range in USD from: $79,800 - $178,100 per year. May be eligible for bonus and equity. Oracle maintains broad salary ranges for its roles in order to account for variations in knowledge, skills, experience, market conditions and locations, as well as reflect Oracle’s differing products, industries and lines of business. Candidates are typically placed into the range based on the preceding factors as well as internal peer equity. Oracle US offers a comprehensive benefits package which includes the following: Medical, dental, and vision insurance, including expert medical opinion Short term disability and long term disability Life insurance and AD&D Supplemental life insurance (Employee/Spouse/Child) Health care and dependent care Flexible Spending Accounts Pre-tax commuter and parking benefits 401(k) Savings and Investment Plan with company match Paid time off: Flexible Vacation is provided to all eligible employees assigned to a salaried (non-overtime eligible) position. Accrued Vacation is provided to all other employees eligible for vacation benefits. For employees working at least 35 hours per week, the vacation accrual rate is 13 days annually for t