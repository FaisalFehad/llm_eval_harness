- description: 4372535566 | Senior Software Engineer @ Syntasso
  vars:
    jd_text: "About the job                                                               Unlock the Future of Platform Engineering with UsImagine helping thousands of engineers build and run platforms that deliver securely and quickly, helping their teams ship real value. At Syntasso, you’ll be part of a small, expert team driving a global shift in how platform engineering is done. Your ideas will directly influence Kratix, our open-source framework, and our commercial product, Syntasso Kratix Enterprise.By joining us, you won’t just build technology, you'll help define the standards of a new discipline. You’ll grow your technical depth, collaborate with leaders in the community, and see your contributions adopted by teams across industries.Our Mission at SyntassoAt Syntasso, we believe platform engineering should empower, not constrain. We started the company after seeing too many teams struggle to build internal platforms that developers actually enjoy using.That’s why we created Kratix: an open-source framework that helps organisations design, deliver, and scale their platforms with confidence. One early adopter cut platform onboarding from weeks to hours using Kratix, freeing engineers to focus on innovation instead of infrastructure.Building on that success, we launched Syntasso Kratix Enterprise to help large-scale teams extend Kratix’s power with enterprise-grade capabilities. Together, these tools are rapidly becoming the go-to choice for platform teams worldwide.By joining Syntasso, you’ll help shape the future of platform engineering empowering developers everywhere to work more effectively and build better software, faster.Why Joining Syntasso Matters for Your Career:By joining us, you'll become a pivotal part of our innovative journey, shaping the future of Kratix, our platform-building framework. Your role will involve close collaboration with Syntasso customers, giving you invaluable insights into their experiences and ensuring seamless Kratix adoption. You'll also have the opportunity to make a lasting impact on the Platform Engineering community in your unique way—whether it's through insightful blogs, prestigious conference speaking engagements, or active engagement with fellow professionals.About the role:As a Senior Software Engineer at Syntasso, you’ll play a key role in designing, building, and evolving Kratix and Syntasso Kratix Enterprise.You’ll collaborate closely with a small, expert engineering team. Your work will span product contribution, customer collaboration, and hands-on system design. You’ll help shape architecture and APIs, improve user experience, and scale Kratix for enterprise environments.In practice, this means you’ll:      Design and implement features for Kratix and Kratix Enterprise, primarily in Golang and Kubernetes.Collaborate on architectural decisions that balance innovation, reliability, and usability.Engage directly with customers to understand their platform challenges and ensure SKE solves them.Work across product and engineering to deliver software that drives real impact.Continuously learn, experiment, and help define what great platform engineering looks like.Provide hands-on support to SKE customers, from diagnosing technical issues to shaping solutions that improve their platform outcomes. About you:      Most importantly, you have a growth mindset. You bring enthusiasm, empathy, and a genuine desire to learn. Qualities that make you a trusted teammate and an active contributor to a thriving engineering community.You’ve built and supported complex software systems before, maybe as part of a startup where you wore many hats, or within a larger organisation where reliability and scale were critical. You enjoy the puzzle of connecting technologies and people, translating complexity into clarity.You thrive in collaborative environments: pairing, sharing ideas, and learning from those around you. When faced with ambiguity, your curiosity takes over; you test, learn, and adapt quickly. You"
