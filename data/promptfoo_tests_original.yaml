ty use cases. Opportunity to shape the product from the early stage through scale. Key Responsibilities      Design and build core automation and platform services. Develop secure, reliable system components. Improve internal tooling and configuration workflows. Deliver visibility, reporting, and control features. Strengthen security and data protection mechanisms. Contribute across frontend, backend, and infrastructure. Partner with customers and internal teams to solve complex problems. Technical Environment      TypeScript and JavaScript. SQL-based datastores. Modern web frameworks. Cross-platform application development. Secure cloud infrastructure. Infrastructure-as-Code. Working Style      High autonomy and technical ownership. Outcome-driven and execution-focused. Comfortable operating in ambiguous environments. Rapid iteration from concept to production. Strong collaboration with customers and internal stakeholders. Desirable Experience      Automation frameworks or tooling. Security, IAM, or PAM platforms. Zero-trust or compliance-driven environments. Identity, access, or governance systems. Early-stage or scale-up company background. Benefits      Competitive base salary with meaningful equity. Private medical and dental. Central London office with flexible working. International mobility opportunities. Unlimited PTO. Regular team events and off-sites. Thanks,Team Amberes                                                                                                                              See more"
