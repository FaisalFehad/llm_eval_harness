 reliabilityCommunicate technical decisions and trade-offs clearly to both technical and non-technical stakeholdersContribute to and help evolve Konfir’s engineering culture through feedback, collaboration, and shared ownership About youYou are an experienced backend engineer who enjoys solving meaningful problems and taking ownership of what you build. You care about building reliable, maintainable systems and are comfortable being responsible for software in production.You have a proactive, roll-up-your-sleeves mindset and are happy to step in, take initiative, and see work through from idea to production. You work well in collaborative environments, value clear and direct communication, and can balance autonomy with teamwork.You’ll likely have:      Experience practising Test Driven Development (TDD)and a strong appreciation for automated testingExperience with pair programming or other highly collaborative development practicesSolid backend experience using Python in productionExperience building and operating systems on AWSSeveral years of experience building and running backend systems end to endComfort working across the full Software Development Lifecycle, from design through to production supportThe ability to explain technical concepts and trade-offs clearly to different audiences Experience with Python, Node.js, AWS, and modern backend architectures will help you succeed, but we value strong engineering fundamentals, curiosity, and a willingness to learn over specific tools.We are an Equal Opportunity employer committed to a diverse and representative team. Whatever your race, religion, colour, national origin, gender, sexual orientation, age, marital status, or disability - we want to hear from you.                                                                                                                              See more"
