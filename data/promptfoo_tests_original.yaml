  vars:
    jd_text: "About the job                                                               ROLE: Lead Backend Developer - Node.jsOFFICE: London We are Two Circles. We are a Sports & Entertainment Marketing business. We grow audiences and revenues. We do that by knowing fans best. We work with clients to help them understand & influence what their fans are doing - the way fans spend their money, the events that fans attend, the channels fans respond to, the content fans watch and more. And we use the understanding this gives us to help our clients grow. Grow their audiences and grow their revenues - both direct to consumer and business to business revenues. Our platforms and services are trusted by over 900 clients globally, including the English Premier League, Red Bull, UEFA, VISA, the NFL, Nike and Amazon. We are almost 1000 people, based out of 14 offices, and we deliver work for sports and entertainment businesses of all shapes and sizes all over the worldJOB DESCRIPTION As part of our ongoing growth, we are expanding our technical team and looking for an experienced Lead Backend Developer to join our London office and provide technical engineering seniority covering design, leadership and hands on implementation of digital products and solutions for our clients. The chosen person will play a pivot role influencing the rapidly growing Two Circles technology proposition and will be responsible for technical seniority and supporting technology consulting projects, identifying and advising on appropriate solutions for our clients. You will have a track record of designing and delivering high-quality digital solutions over the last 5+ years, and a keen interest in the application of technology in the sports industry. If this sounds like you, we would love to hear from you.  Key Responsibilities (People + Engineering Culture):        Work closely with Engineering Managers, Engineering Leads and Product Managers to understand problems and define technical scope for global sports properties.You will be active in the hiring of other Software Engineers whilst helping refine and improve the process.Being an advocate for developer experience and a keen interest in continually improving it.Encouraging a blameless culture of continuous improvement and technical excellence.This is a hybrid role where you are expected to be in our London office for 2 days a week and occasionally travel to client offices in London and EMEA . Key Responsibilities (Technical):       Creation of architectural diagrams and technical specifications for multi-platform product strategies (applications being used by millions of users daily)       Influencing and contributing to the technical design and development of digital projects        Working alongside clients and project teams to understand requirements and provide technical expertise and leadership on appropriate solutions        Setting up software development frameworks for release management, automation, code quality and source control        Hands on when required to solve problems and setup projects for success during the early stages        Collaboration with product leads, consultants, designers and developers to deliver high-quality solutions across web, mobile apps and OTT        Technical authoring and supporting business development opportunities        Providing technical leadership, mentoring and guidance to other Two Circles development resources        Keeping up to date on emerging technologies and trends in sports technology        Presence in our London office for 2 days a week is encouraged for this role and occasional travel to client offices in London and EMEA will be required at times  RequirementsSkills:       A minimum of 10+ years' experience in software engineering.A strong desire to continually learn and improve.Solid understanding of JavaScript and TypeScript fundamentals, with hands-on experience using Node.js.Strong understanding of database systems, including both document-oriented databas"
