- description: 4369459764 | Back End Engineer at VC backed startup (£60-130k) @ Jumpstart
  vars:
    jd_text: "About the job                                                               Who we areJumpstart is a startup hiring platform partnering with a small, curated group of ambitious VC-backed startups in the UK. Our job is not to sell you roles, it’s to make sure that when you do move, it’s into a place where you’ll actually get to build, learn, and have real impact.About the roleYou will join a Seed/Series A VC-backed startup as one of the first backend engineering hires, with significant ownership over core systems, data models, and backend architecture. You’ll work closely with founders, frontend, and product to design and build the foundations the company will scale on and help define the technical standards and engineering culture that future hires will inherit.What you’ll work onMost backend roles today are about maintaining systems someone else designed.This one is different.At our partner startups, you’ll be trusted as a high-agency backend engineer to build and evolve core systems from day one. You’ll own the hardest problems early: data, performance, reliability, and scale; and help shape the long-term technical direction of the product.You will:      Design, build, and scale backend systems used by thousands or millions of usersOwn core services end-to-end, from data modeling and APIs to production reliabilityMake architectural decisions around databases, infrastructure, and system boundariesWork directly with founders, frontend engineers, and PMs. No layers, no handoffsShip quickly, iterate relentlessly, and see immediate real-world impact What we’re looking forWe’re looking for engineers who are:      Strong backend builders with solid fundamentals in systems and dataComfortable with modern backend tooling (e.g. TypeScript/Node, Python, or similar)Thoughtful about tradeoffs around performance, reliability, and maintainabilityProduct-minded: you care about outcomes, not just elegant abstractionsAutonomous, pragmatic, and excited by early-stage or fast-moving environmentsClear communicators who enjoy collaborating beyond engineering We care far more about your ability to reason, design, and own problems than about any specific language, framework, or cloud provider.How our process works01: Apply to JumpstartApply in ~2 minutes HERE with your CV and anything you’ve built (GitHub, side projects, startups). If it looks like a fit, you’ll have a short call with our in‑house CTO. No live coding. No take‑homes. Just a chat to understand how you think as an engineer.02: Join the platformOnce accepted, you’ll create a profile and get access to a curated set of early‑stage engineering roles, all from vetted VC‑backed startups.03: CTOs pitch to youWe share your profile with 100+ CTOs in our network. Strong candidates often receive multiple direct messages from CTOs pitching their role, team, and product.04: Get support landing your roleYou’ll get access to a hotline with our in-house CTO Patrick, with 1-1 support on everything from initial interview support, to case study feedback, all the way through to final offer negotiation & support.What makes this different      Unparalleled access: CTOs pitch to you and your profile is shared with 100s of startupsCurated matching: We filter hard on both sidesSignal over noise: No mass applications or recruiter spamReal ownership: Roles where engineers shape the product and cultureUK-focused: Leading UK startups, remote-friendly or London-based What you get      Access to roles that aren’t publicly advertisedOptional 1:1 prep with experienced engineers, founders, or CTOsA long-term community of builders, potential collaborators & co-founders                                                                                                                               See more"
