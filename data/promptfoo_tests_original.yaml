  vars:
    jd_text: "About the job                                                               As a Software Engineer at TxODDS, you’ll build and maintain real-time products and collaborate across teams in our global 24/7 sports data business.Role: Software EngineerLocation: London (Hybrid - min. 1 day per week in office)Permanent, full-timeAbout TxODDSTxODDS is the world’s leading provider of real-time aggregated sporting odds, delivering intelligent, integrity-led insights to clients across the globe. We operate in a fast-paced, 24-hour environment where innovation and precision are key. Our engineering team is at the heart of this mission - building and maintaining the products that power our business.We’re now looking for a Software Engineer to join our Engineering team. This is a hands-on role where you’ll work on high-impact projects, collaborate with talented colleagues across the UK and EU, and help shape the future of sports data technology.What You’ll Do:As a Software Engineer at TxODDS, you’ll play a key role in developing and maintaining our core products. You’ll be part of a collaborative team working on both new features and business-as-usual (BAU) maintenance, with a strong focus on code quality, performance, and innovation.Your responsibilities will include:      Writing runnable, deployed code with automated tests and documentation.Maintaining and improving existing codebases and infrastructure.Participating in task estimation, release planning, and delivery.Communicating effectively with developers, product owners, testers, and stakeholders.Ensuring software is performant and meets specifications.Supporting infrastructure-as-code and CI/CD practices.Actively contributing to peer reviews and mentoring junior developers.Continuously learning and sharing knowledge across the team. What You’ll Bring:We’re looking for someone with solid technical skills, a collaborative mindset, and a passion for clean, efficient code. For this role, Scala development experience is essential.You’ll also bring:      Strong experience in test-driven, functional development using Scala.Familiarity with Typelevel frameworks (Cats, Cats Effect, http4s, fs2).Experience with SQL and NoSQL databases.Understanding of software architecture, requirements engineering, and UML.Comfort working with Linux and the network stack for service hosting.Knowledge of algorithmic complexity and performance tuning.Experience with tools like Confluence, JIRA, and Kanban methodology.A logical, structured approach to problem-solving.Excellent communication skills and the ability to work in a fast-paced environment. Nice to have:      Exposure to sports data or betting systems.Interest in applied mathematics and emerging technologies.Experience in mentoring junior team members. What You’ll Get From Us:You’ll be joining a dynamic, fast-paced team in a business that values innovation, simplicity, and collaboration. You’ll be part of a company that prioritises technical excellence, continuous learning, and meaningful impact.Our Interview ProcessHere’s what you can expect from our process:      An initial call with our Talent PartnerA Technical AssessmentTwo rounds of interviews with various stakeholders and leaders, with at least one stage taking place in our London office (ideally both, if possible) Please note, we use AI tools to record calls during the process. This helps us give you our full attention in the conversation and ensures we can review discussions accurately.                                                                                                                              See more"
