  vars:
    jd_text: "About the job                                                               ScaleXPScaleXP is a smart finance automation platform. We help SMEs automate their finance and sales operations by integrating disparate business systems. By automating these tasks we save our customers time, give them confidence in their data, and provide insights that were previously not possible. Both the business and team are fast growing. Now is a very interesting time to join ScaleXP.How do we do thisUsing python we integrate with 10+ Accounting, CRM, and payment platforms, we run asynchronous ELT tasks. Storing the data, normalising the data so we can work with data from separate systems like they are the same, and build smart automations on top of this.These automations vary from NLP to extract dates from documents, using elastic search to match separate data sources together, or building time based schedules from multiple data sources.Since there are a lot of variables, edge cases, and complex domain knowledge, we heavily rely on automated testing.Your role in thisIn this role you will:      Work closely with product & customer success to create solutions that actually solve the end users problems.Create and maintain new 3rd party integrations.Create and maintain new automations on top of the imported data.Make POCs/MVPs for potential new features.Support DevOps efforts.Improve the Quality, Scalability, Security, and Reliability of the BE as a whole. Who we're looking forWe're looking for someone with at least,      5+ years of BE development experience.2+ years of Python experience.2+ years of Relational Database experience. Additional experience in the following are a plus: Django, Celery, Postgres, Docker, Terraform, AWS, Integrating 3rd party APIs, building APIs, Unit & Integration testing.We're looking for someone who has an end-to-end mindset. You can take ownership of a task, propose a solution and plan, involve the right parties, asks the right questions, and can deliver independently if necessary.Preferably you're someone that understands no one person knows everything, and is willing to learn, but also explain and teach others.Experience in a startup is a big plus, you enjoy working in a team with rapid iterations.LocationScaleXP is a hybrid working company. We work from our central London office 2 days a week. We do allow the occasional work from abroad, for example to visit family.                                                                                                                              See more"
