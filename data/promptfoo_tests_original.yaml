umbers, you’ll be influencing strategy, optimising processes, and helping position a brand that’s setting the new standard for trust and transparency. For people who love learning, innovating, and making an impact that matters now is the moment to be a part of Xapien. The RoleWe're hiring Senior Frontend Engineers to join our Core App team. You'll be responsible for building the interfaces and experiences that our users interact with daily, working closely with backend engineers, product managers, designers, and other teams across the organisation.Our frontend stack is modern React with Vite, Turbo, Tailwind CSS, and Storybook. You'll work on everything from core user journeys to sophisticated data visualisations, collaborating with teams across engineering including our Investigations, Platform, and Customer Success teams.What You'll Do      Build responsive, accessible, performant user interfaces using React and modern frontend toolingCollaborate closely with designers to implement pixel-perfect UIs and great user experiencesWork with backend engineers to design and consume APIs effectivelyWrite well-tested, maintainable code following established patternsContribute to our component library and design systemParticipate in code reviews and help maintain frontend standardsWork cross-functionally with other teams to deliver featuresDebug and optimize frontend performanceMentor junior engineers and share knowledge with the teamBuild new features and improve existing user journeys What We're Looking ForEssential:      5+ years of professional frontend engineering experienceStrong expertise in React and modern JavaScript/TypeScriptDeep understanding of HTML, CSS, and web standardsExperience building responsive, accessible user interfacesProficiency with modern frontend build tools and workflowsStrong understanding of state management patternsExperience with component-driven development and design systemsCommitment to testing and code qualityExcellent collaboration and communication s"
