- description: 4369465628 | Frontend Engineer at VC backed startup (£60-130k) @ Jumpstart
  vars:
    jd_text: "About the job                                                               Who we areJumpstart is a startup hiring platform partnering with a small, curated group of ambitious VC-backed startups in the UK. Our job is not to sell you roles. It’s to make sure that when you do move, it’s into a place where you’ll actually get to build, learn, and have real impact.About the roleYou will join a Seed/Series A VC-backed startup as one of the first frontend engineering hires, with significant ownership over the user-facing product and frontend architecture. You’ll work closely with founders, design, and product to turn early ideas into polished, scalable experiences, and help define the frontend standards, tooling, and culture that future hires will inherit.What you’ll work onMost frontend roles today aren’t really frontend roles. They’re ticket queues.This one is different.At our partner startups, you’ll be trusted as a high-agency frontend engineer to build real products, not just implement designs. You’ll own core user experiences end-to-end and help shape how the product feels, performs, and evolves.You will:      Build and ship high-quality user interfaces used by thousands or millions of usersOwn features end-to-end, from interaction design to production-ready codeShape frontend architecture, patterns, and performance from day oneWork directly with founders, designers, and PMs. No layers, no handoffsShip quickly, iterate relentlessly, and see immediate real-world impact What we’re looking forWe’re looking for engineers who are:      Strong across the stack and opinionated about building great productsComfortable with modern frontend and backend tooling (e.g. React, TypeScript, Node)Product-minded; you care about outcomes, not just implementationsAutonomous, pragmatic, and excited by early-stage or fast-moving environmentsClear communicators who enjoy collaborating beyond engineering We care far more about your ability to reason, ship, and own problems than about any specific tech stack.How our process works01 : Apply to JumpstartApply in ~2 minutes HERE with your CV and anything you’ve built (GitHub, side projects, startups). If it looks like a fit, you’ll have a short call with our in‑house CTO. No live coding. No take‑homes. Just a chat to understand how you think as an engineer.02: Join the platformOnce accepted, you’ll create a profile and get access to a curated set of early‑stage engineering roles, all from vetted VC‑backed startups.03: CTOs pitch to youWe share your profile with 100+ CTOs in our network. Strong candidates often receive multiple direct messages from CTOs pitching their role, team, and product.04: Get support landing your roleYou’ll get access to a hotline with our in-house CTO Patrick, with 1-1 support on everything from initial interview support, to case study feedback, all the way through to final offer negotiation & support.What makes this different      Unparalleled access: CTOs pitch to you and your profile is shared with 100s of startupsCurated matching: We filter hard on both sidesSignal over noise: No mass applications or recruiter spamReal ownership: Roles where engineers shape the product and cultureUK-focused: Leading UK startups, remote-friendly or London-based What you get      Access to roles that aren’t publicly advertisedOptional 1:1 prep with experienced engineers, founders, or CTOsA long-term community of builders, potential collaborators & co-founders                                                                                                                               See more"
